services:
  # Web Service
  - type: web
    name: capavenir-web
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false # will be prompted to enter it manually
      - key: APP_URL
        value: https://capavenir-web.onrender.com # replace with your domain
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_DOMAIN
        value: ""
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_API_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        value: "admin@capavenir.tn"
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false  # Votre email de compte Brevo
      - key: MAIL_PASSWORD
        sync: false  # Votre clé SMTP Brevo (générée depuis votre compte)
      - key: MAIL_ENCRYPTION
        value: "tls"
      - key: MAIL_FROM_ADDRESS
        sync: false  # Votre email d'expéditeur validé dans Brevo
      - key: MAIL_FROM_NAME
        value: "CapAvenir"
