services:
  # Web Service
  - type: web
    name: capavenir-web
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false # will be prompted to enter it manually
      - key: APP_URL
        value: https://capavenir-web.onrender.com # replace with your domain
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_DOMAIN
        value: ""
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_API_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        value: "admin@capavenir.tn"
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: MAIL_MAILER
        value: brevo
      - key: BREVO_API_KEY
        sync: false  # Votre cle API v3 Brevo
      - key: MAIL_FROM_ADDRESS
        sync: false  # Votre email d'expediteur valide dans Brevo (ex: esraaouni2023e@gmail.com)
      - key: MAIL_FROM_NAME
        value: "CapAvenir"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://capavenir-web.onrender.com/auth/google/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        value: https://capavenir-web.onrender.com/auth/github/callback
