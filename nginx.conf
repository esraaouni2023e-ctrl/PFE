server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    client_max_body_size 100M;
    keepalive_timeout 650s;

    # Redirect HTTP to HTTPS behind Render proxy
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Detect if request is HTTPS from reverse proxy
    set $fastcgi_https "";
    if ($http_x_forwarded_proto = "https") {
        set $fastcgi_https "on";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proxy Socket.io signaling connections to Node.js server
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Pusher mock WebSocket connections to Node.js server
    location /app/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_cache_bypass $http_upgrade;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Tell PHP-FPM if the original request was HTTPS
        fastcgi_param HTTPS $fastcgi_https;
        
        # Increase FastCGI timeouts to 600 seconds
        fastcgi_read_timeout 600s;
        fastcgi_connect_timeout 600s;
        fastcgi_send_timeout 600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}


