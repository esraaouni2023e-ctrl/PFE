<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapAvenir - Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'] },
                    colors: {
                        navy: { 900: '#0A1428', 800: '#001122' },
                        cyan: { 400: '#00D4FF', 500: '#0099FF' },
                        gold: { 400: '#FFCC00' }
                    },
                    animation: { 'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        body {
            background: #0A1428;
            overflow-y: auto;
        }

        .neural-particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: radial-gradient(circle, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .glass-form {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            border-color: #00D4FF;
        }

        /* Custom Checkbox */
        .custom-checkbox:checked {
            background-color: #00D4FF;
            border-color: #00D4FF;
        }
    </style>
</head>

<body class="min-h-screen w-screen flex items-center justify-center py-12 relative">
    <div class="neural-particles"></div>
    <div
        class="absolute inset-0 bg-gradient-to-t from-[#0A1428] via-transparent to-transparent z-0 pointer-events-none">
    </div>

    <div class="relative z-10 w-full max-w-lg px-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-display font-bold text-white mb-2">Rejoignez <span
                    class="text-cyan-400">CapAvenir</span></h1>
            <p class="text-cyan-200/60 font-medium tracking-wide">Commencez votre voyage vers le succès</p>
        </div>

        <div class="glass-form rounded-3xl p-8 border-t border-white/10">
            <form class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Prénom</label>
                        <input type="text"
                            class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow"
                            placeholder="Jean">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nom</label>
                        <input type="text"
                            class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow"
                            placeholder="Dupont">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email
                        Académique</label>
                    <div class="relative">
                        <input type="email"
                            class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow"
                            placeholder="jean.dupont@ecole.fr">
                        <span class="absolute right-3 top-3 text-green-400 opacity-0 transition-opacity">
                            <svg class="w-5 h-5 drop-shadow-[0_0_5px_lime]" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7"></path>
                            </svg>
                        </span>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Niveau
                        d'Études</label>
                    <select
                        class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow appearance-none">
                        <option value="" disabled selected>Sélectionnez votre niveau</option>
                        <option value="seconde">Seconde</option>
                        <option value="premiere">Première</option>
                        <option value="terminale">Terminale</option>
                        <option value="sup">Enseignement Supérieur</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Mot de
                        passe</label>
                    <input type="password"
                        class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow"
                        placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Confirmer le mot
                        de passe</label>
                    <input type="password"
                        class="w-full bg-[#050A14]/50 border border-white/10 rounded-xl px-4 py-3 text-white outline-none transition-all input-glow"
                        placeholder="••••••••">
                </div>

                <div class="flex items-start gap-3 mt-2">
                    <input type="checkbox" id="cgu"
                        class="mt-1 w-4 h-4 rounded border-gray-600 bg-[#050A14] custom-checkbox transition-colors">
                    <label for="cgu" class="text-xs text-gray-400 leading-relaxed">
                        J'accepte les <a href="#"
                            class="text-cyan-400 hover:text-white underline decoration-cyan-500/30">Conditions Générales
                            d'Utilisation</a> et la <a href="#"
                            class="text-cyan-400 hover:text-white underline decoration-cyan-500/30">Politique de
                            Confidentialité</a> de CapAvenir.
                    </label>
                </div>

                <button type="button"
                    class="w-full py-4 mt-4 rounded-xl font-bold text-black bg-gradient-to-r from-cyan-400 to-cyan-500 shadow-[0_0_20px_rgba(0,212,255,0.3)] hover:shadow-[0_0_30px_rgba(0,212,255,0.5)] transform hover:-translate-y-0.5 transition-all text-sm uppercase tracking-wider group relative overflow-hidden">
                    <span class="relative z-10">Créer mon compte</span>
                    <div
                        class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                    </div>
                </button>
            </form>
        </div>
        <p class="text-center mt-6 text-gray-500 text-xs">
            Déjà inscrit ? <a href="login.html" class="text-cyan-400 font-bold hover:text-white transition-colors">Se
                connecter</a>
        </p>
    </div>
</body>

</html>
